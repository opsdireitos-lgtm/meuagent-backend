version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    container_name: meuagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meuagent
      POSTGRES_PASSWORD: meuagent_pass
      POSTGRES_DB: meuagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"


  redis:
    image: redis:7-alpine
    container_name: meuagent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"


  backend:
    build: .
    container_name: meuagent_backend
    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    ports:
      - "3333:3333"

    environment:
      DATABASE_URL: postgresql://meuagent:meuagent_pass@postgres:5432/meuagent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3333


volumes:
  postgres_data:
  redis_data:
