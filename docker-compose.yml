backend:
  image: node:20-alpine
  working_dir: /app
  command: sh -c "apk add --no-cache git && git clone https://github.com/opsdireitos-lgtm/meuagent-backend.git . && npm install && node server.js"
  depends_on:
    - postgres
    - redis
  ports:
    - "3333:3333"
  environment:
    DATABASE_URL: postgresql://meuagent:meuagent_pass@postgres:5432/meuagent
    REDIS_HOST: redis
    REDIS_PORT: 6379
    PORT: 3333
