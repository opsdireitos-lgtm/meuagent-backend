version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meuagent
      POSTGRES_PASSWORD: meuagent_pass
      POSTGRES_DB: meuagent
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && node server.js"
    depends_on:
      - postgres
      - redis
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: postgresql://meuagent:meuagent_pass@postgres:5432/meuagent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3333

volumes:
  postgres_data:
