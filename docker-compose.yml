version: "3.8"

services:

  postgres:
    image: postgres:16-alpine
    container_name: meuagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meuagent
      POSTGRES_PASSWORD: meuagent_pass
      POSTGRES_DB: meuagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meuagent -d meuagent"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: meuagent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


  backend:
    build: .
    container_name: meuagent_backend
    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    ports:
      - "3333:3333"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://meuagent:meuagent_pass@postgres:5432/meuagent
      REDIS_HOST: redis
      REDIS_PORT: 6379

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


volumes:
  postgres_data:
  redis_data:
